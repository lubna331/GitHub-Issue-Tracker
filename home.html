<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--title -->
    <title>GitHub Issue Tracker</title>
    <!-- tailwind + daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <!-- google font links -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- font awesome for icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- set font for all -->
     <style>
        *{
            font-family: "Geist", sans-serif;
        }
      </style>
</head>
<body class="bg-base-200 h-svh">
    <nav class="h-16 px-10 py-2 flex justify-between bg-base-100 shadow-sm">
        <div class="flex items-center justify-start gap-2">
            <img src="./assets/github-logo.png" class="w-10 h-10">
            <h1 class="font-semibold text-lg">GitHub Issues Tracker</h1>
        </div>
        <div class="flex items-center justify-start gap-2">
            <input type="text" placeholder="Search" class="input w-24 input-bordered md:w-auto" />
            <button class="btn btn-primary">+ New Issue</button>
        </div>
    </nav>
</body>
</html>
