<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--title -->
    <title>GitHub Issue Tracker</title>
    <!-- tailwind + daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <!-- google font links -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- font awesome for icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- set font for all -->
     <style>
        *{
            font-family: "Geist", sans-serif;
        }
      </style>
</head>
<body class="bg-base-200 h-svh">
    <!-- navbar -->
    <nav class="h-16 px-10 py-2 flex justify-between bg-base-100 shadow-sm">
        <div class="flex items-center justify-start gap-2">
            <img src="./assets/github-logo.png" class="w-10 h-10">
            <h1 class="font-semibold text-lg">GitHub Issues Tracker</h1>
        </div>
        <div class="flex items-center justify-start gap-2">
            <input type="text" placeholder="Search" class="input w-24 input-bordered md:w-auto" />
            <button class="btn bg-[#4A00FF] text-white "><span class="text-xl font-normal">+</span> New Issue</button>
        </div>
    </nav>

    <!-- tab buttons -->
    <header class="mt-10">
        <div class="m-auto px-6 bg-base-100 shadow w-[80%] h-20 flex items-center gap-3 rounded-md">
            <button onclick="toggleStyleAll()" id="toggle-all" class="text-[#64748B] border border-gray-300 w-[100px] h-[32px] text-sm bg-base-100 cursor-pointer 
            rounded-sm toggle-btn">All</button>
            <button onclick="toggleStyleOpen()" id="toggle-open" class="text-[#64748B] border border-gray-300 w-[100px] h-[32px] text-sm bg-base-100 cursor-pointer
            rounded-sm toggle-btn">Open</button>
            <button onclick="toggleStyleClosed()" id="toggle-closed" class="text-[#64748B] border border-gray-300 w-[100px] h-[32px] text-sm bg-base-100 cursor-pointer
            rounded-sm toggle-btn">Closed</button>
        </div>
    </header>

    <!--ALL-Tab card-banner and cards -->
    <section id="all-tab" class="mt-4">
        <div class="m-auto bg-base-200 shadow w-[80%] rounded-md">
            <div class="px-6 bg-base-100 shadow w-[100%] h-20 rounded-t-md flex items-center justify-between">
                <div class="flex items-center justify-center gap-2">
                    <img src="./assets/Aperture.png" alt="">
                    <div>
                        <h3 class="font-semibold"><span id="issue">50</span> Issues</h3>
                        <p class="text-sm text-gray-500">Track and manage your project issues</p>
                    </div>
                </div>    
                <div class="flex items-center justify-center gap-2 text-sm">
                    <img src="./assets/green.png" alt="" class="w-2 h-2"><span>Open</span>
                    <img src="./assets/purple.png" alt="" class="w-2 h-2"><span>Closed</span>
                </div>
            </div>

            <div>
                for cards
            </div>
        </div>
    </section>




    <script src="./JS/home.js"></script>
</body>
</html>
